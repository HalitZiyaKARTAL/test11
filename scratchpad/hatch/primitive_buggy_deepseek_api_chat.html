<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DeepSeek Chat – Settings Fix & Stream Buffer</title>
    <style>
        :root {
            --bg: #0f0f1a; --surface: #1a1a2e; --text: #e0e0e8; --text-secondary: #9090a8;
            --accent: #5b8def; --border: #2a2a40; --user-bubble: #1e3a6e; --ai-bubble: #1e3a3a;
            --thinking-bg: #1a2030; --danger: #e0556a; --success: #4caf84; --code-bg: #0a0a14;
            --warning: #d4a050; --safe-bottom: env(safe-area-inset-bottom, 0px); --block-font-scale: 0.5;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body { height:100%; height:100dvh; overflow:hidden; touch-action:manipulation; }
        body { font-family:system-ui,-apple-system,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); display:flex; flex-direction:column; }
        .header { background:var(--surface); border-bottom:1px solid var(--border); padding:8px 14px; display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; z-index:10; }
        .header-left { display:flex; align-items:center; gap:10px; }
        .header-left h1 { font-size:1rem; font-weight:600; white-space:nowrap; }
        .status-dot { width:7px; height:7px; border-radius:50%; background:var(--success); box-shadow:0 0 6px var(--success); animation:pulse 2s infinite; }
        .status-dot.off { background:var(--danger); box-shadow:none; animation:none; }
        @keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }
        .token-counter { font-size:0.7rem; color:var(--text-secondary); background:var(--border); padding:3px 10px; border-radius:6px; font-family:monospace; }
        .header-right { display:flex; align-items:center; gap:6px; flex-wrap:wrap; position:relative; }
        .api-key-wrapper { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:4px 8px; }
        .api-key-wrapper input { background:transparent; border:none; color:var(--text); font-size:0.78rem; width:130px; outline:none; font-family:monospace; }
        .api-key-wrapper input::placeholder { color:var(--text-secondary); }
        .btn { background:var(--accent); color:#fff; border:none; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.75rem; font-weight:500; }
        .btn:hover { background:#6ea1ff; }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-secondary); padding:4px 8px; border-radius:6px; font-size:0.75rem; cursor:pointer; }
        .btn-outline:hover { background:var(--border); color:var(--text); }
        .settings-btn { background:transparent; border:1px solid var(--border); color:var(--text-secondary); width:30px; height:30px; border-radius:8px; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; }
        .settings-btn:hover { background:var(--border); color:var(--text); }
        .settings-panel { position:absolute; top:40px; right:0; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px; min-width:260px; max-height:70vh; overflow-y:auto; z-index:100; display:none; flex-direction:column; gap:12px; font-size:0.78rem; box-shadow:0 8px 24px rgba(0,0,0,0.4); }
        .settings-panel.open { display:flex; }
        .setting-row { display:flex; align-items:center; justify-content:space-between; }
        .setting-row input[type="number"] { width:65px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:2px 6px; border-radius:4px; font-size:0.75rem; }
        .toggle { position:relative; display:inline-block; width:36px; height:20px; }
        .toggle input { opacity:0; width:0; height:0; }
        .toggle .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:var(--border); border-radius:20px; transition:0.3s; }
        .toggle .slider:before { position:absolute; content:""; height:16px; width:16px; left:2px; bottom:2px; background:var(--text); border-radius:50%; transition:0.3s; }
        .toggle input:checked+.slider { background:var(--accent); }
        .toggle input:checked+.slider:before { transform:translateX(16px); }
        .chat-container { flex:1 1 auto; min-height:0; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; transition:height 0.1s; }
        .chat-container::-webkit-scrollbar { width:4px; }
        .chat-container::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
        .welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:10px; color:var(--text-secondary); }
        .welcome .icon { font-size:2.5rem; }
        .welcome h2 { color:var(--text); font-size:1.3rem; }
        .message { max-width:90%; animation:fadeIn 0.25s ease; }
        .message.user { align-self:flex-end; }
        .message.assistant { align-self:flex-start; }
        .message.system-msg { align-self:center; max-width:95%; }
        @keyframes fadeIn { from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }
        .msg-header { display:flex; align-items:center; gap:6px; font-size:0.68rem; color:var(--text-secondary); padding:0 0 4px 0; }
        .msg-header .msg-meta { display:flex; gap:12px; align-items:center; flex-wrap:wrap; flex:1; }
        .msg-header .toggle-btn { background:none; border:none; color:var(--text-secondary); cursor:pointer; font-size:0.9rem; padding:0 2px; transition:0.2s; }
        .msg-header .toggle-btn.collapsed { transform:rotate(-90deg); }
        .msg-body { display:flex; flex-direction:column; gap:4px; }
        .msg-body.collapsed { display:none; }
        .msg-row { display:flex; gap:10px; }
        .avatar { width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0.7rem; font-weight:600; }
        .user .avatar { background:#3b6fc2; color:#fff; }
        .assistant .avatar { background:#2a6b5c; color:#fff; }
        .system-msg .avatar { background:#6b4e2a; color:#fff; }
        .bubble { padding:10px 14px; border-radius:16px; line-height:1.55; font-size:0.87rem; word-wrap:break-word; overflow-wrap:break-word; min-width:0; flex:1; }
        .user .bubble { background:var(--user-bubble); border-bottom-right-radius:4px; }
        .assistant .bubble { background:var(--ai-bubble); border-bottom-left-radius:4px; }
        .system-msg .bubble { background:#2a2218; border:1px solid #4a3a20; }
        .msg-footer { display:flex; align-items:center; justify-content:flex-end; gap:8px; font-size:0.65rem; color:var(--text-secondary); padding:2px 0 0 0; }
        .msg-footer button { background:none; border:1px solid var(--border); color:var(--text-secondary); padding:2px 6px; border-radius:4px; cursor:pointer; font-size:0.65rem; }
        .msg-footer button:hover { background:var(--border); color:var(--text); }
        .msg-footer .footer-toggle-btn { font-size:0.8rem; padding:0 4px; }
        .thinking-block { margin:0 0 8px 0; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
        .thinking-header { display:flex; align-items:center; justify-content:space-between; background:var(--thinking-bg); padding:5px 10px; font-size:0.7rem; color:var(--warning); cursor:pointer; user-select:none; }
        .thinking-body { padding:8px 12px; font-size:0.78rem; color:var(--text-secondary); white-space:pre-wrap; line-height:1.5; background:var(--bg); display:block; }
        .thinking-body.collapsed { display:none; }
        .thinking-header .arrow { transition:0.2s; }
        .thinking-header .arrow.collapsed { transform:rotate(-90deg); }
        .code-block { margin:8px 0; border:1px solid var(--border); border-radius:8px; overflow:hidden; }
        .code-header { display:flex; align-items:center; justify-content:space-between; background:var(--surface); padding:4px 10px; font-size:0.7rem; color:var(--text-secondary); border-radius:6px 6px 0 0; }
        .code-footer { display:flex; align-items:center; justify-content:space-between; background:var(--surface); padding:4px 10px; font-size:0.7rem; color:var(--text-secondary); border-radius:0 0 6px 6px; border-top:1px solid var(--border); }
        .code-header .lang { font-weight:600; text-transform:uppercase; }
        .code-header .actions,.code-footer .actions { display:flex; gap:8px; align-items:center; }
        .code-header button,.code-footer button { background:none; border:1px solid var(--border); color:var(--text-secondary); padding:2px 7px; border-radius:4px; cursor:pointer; font-size:0.7rem; }
        .code-header button:hover,.code-footer button:hover { background:var(--border); color:var(--text); }
        .code-body { display:block; }
        .code-body.collapsed { display:none; }
        .code-body pre { margin:0; padding:10px; background:var(--code-bg); overflow-x:auto; font-family:monospace; font-size:calc(0.78rem * var(--block-font-scale)); line-height:1.4; white-space:pre-wrap; word-break:break-word; }
        .code-body pre code { background:none; padding:0; white-space:pre-wrap; word-break:break-word; }
        .error-block { background:rgba(224,85,106,0.15); border:1px solid rgba(224,85,106,0.4); border-radius:8px; padding:8px 12px; }
        .typing-indicator { display:flex; gap:5px; padding:8px 0; }
        .typing-indicator span { width:7px; height:7px; border-radius:50%; background:var(--text-secondary); animation:bounce 1.4s infinite ease; }
        .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
        @keyframes bounce { 0%,60%,100%{ transform:translateY(0); opacity:0.4; } 30%{ transform:translateY(-7px); opacity:1; } }
        .input-area { background:var(--surface); border-top:1px solid var(--border); padding:8px 14px; padding-bottom:calc(8px + var(--safe-bottom)); display:flex; gap:8px; align-items:flex-end; }
        .input-area textarea { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:12px; padding:10px 14px; color:var(--text); font-size:0.87rem; resize:none; min-height:40px; max-height:100px; outline:none; font-family:inherit; line-height:1.4; white-space:pre-wrap; word-wrap:break-word; }
        .input-area textarea:focus { border-color:var(--accent); }
        .send-btn { background:var(--accent); color:#fff; border:none; width:40px; height:40px; border-radius:12px; cursor:pointer; font-size:1.2rem; }
        .send-btn:disabled { opacity:0.4; cursor:default; }
        .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#2a2a3e; border:1px solid var(--border); color:var(--text); padding:8px 20px; border-radius:20px; font-size:0.8rem; z-index:200; opacity:0; pointer-events:none; transition:0.3s; }
        .toast.show { opacity:1; }
        .toast.error { border-color:var(--danger); background:#3a1a22; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <span class="status-dot" id="statusDot"></span>
        <h1>DeepSeek Chat</h1>
        <span class="token-counter" id="tokenCounter">0+0 tokens</span>
    </div>
    <div class="header-right">
        <select class="btn-outline" id="modelSelect" style="font-size:0.75rem; padding:4px 8px; background:var(--bg); color:var(--text); border-radius:6px; outline:none;" disabled>
            <option>No key</option>
        </select>
        <div class="api-key-wrapper">
            <input type="password" id="apiKeyInput" placeholder="sk-..." spellcheck="false" />
        </div>
        <button class="btn" id="saveKeyBtn">Save</button>
        <button class="settings-btn" id="settingsBtn">⚙️</button>
        <div class="settings-panel" id="settingsPanel">
            <div class="setting-row"><span>Enter sends message</span><label class="toggle"><input type="checkbox" id="enterSendsToggle"><span class="slider"></span></label></div>
            <div class="setting-row"><span>Show user messages</span><label class="toggle"><input type="checkbox" id="showUserToggle" checked><span class="slider"></span></label></div>
            <div class="setting-row"><span>Show assistant msgs</span><label class="toggle"><input type="checkbox" id="showAssistantToggle" checked><span class="slider"></span></label></div>
            <div class="setting-row"><span>Stream responses</span><label class="toggle"><input type="checkbox" id="streamToggle"><span class="slider"></span></label></div>
            <div class="setting-row"><span>Auto‑collapse msg &gt;</span><input type="number" id="msgCollapseSize" value="20000" min="0"></div>
            <div class="setting-row"><span>Msg auto‑collapse ON</span><label class="toggle"><input type="checkbox" id="msgCollapseToggle"><span class="slider"></span></label></div>
            <div class="setting-row"><span>Auto‑collapse block &gt;</span><input type="number" id="blockCollapseSize" value="5000" min="0"></div>
            <div class="setting-row"><span>Block auto‑collapse ON</span><label class="toggle"><input type="checkbox" id="blockCollapseToggle"><span class="slider"></span></label></div>
            <div class="setting-row"><span>Code font scale</span><input type="number" id="fontScale" value="0.5" min="0.2" max="2" step="0.1"></div>
            <button class="btn" id="applySettingsBtn">Apply Settings</button>
        </div>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcomeScreen">
        <div class="icon">🤖</div>
        <h2>Welcome</h2>
        <p>Enter your DeepSeek API key and start chatting.</p>
    </div>
</div>

<div class="input-area">
    <textarea id="messageInput" placeholder="Type a message..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" disabled>➤</button>
</div>
<div class="toast" id="toast"></div>

<script>
(() => {
    const $ = id => document.getElementById(id);
    const els = {
        statusDot: $('statusDot'), tokenCounter: $('tokenCounter'), modelSelect: $('modelSelect'),
        apiKeyInput: $('apiKeyInput'), saveKeyBtn: $('saveKeyBtn'), settingsBtn: $('settingsBtn'),
        settingsPanel: $('settingsPanel'), enterSendsToggle: $('enterSendsToggle'),
        showUserToggle: $('showUserToggle'), showAssistantToggle: $('showAssistantToggle'),
        streamToggle: $('streamToggle'), msgCollapseSize: $('msgCollapseSize'),
        msgCollapseToggle: $('msgCollapseToggle'), blockCollapseSize: $('blockCollapseSize'),
        blockCollapseToggle: $('blockCollapseToggle'), fontScale: $('fontScale'),
        applySettingsBtn: $('applySettingsBtn'), chatContainer: $('chatContainer'),
        messageInput: $('messageInput'), sendBtn: $('sendBtn'), welcomeScreen: $('welcomeScreen'),
        toast: $('toast')
    };

    let apiKey = '', conversationHistory = [], msgCounter = 0;
    let promptTokens = parseInt(localStorage.getItem('dse_promptTokens')) || 0;
    let completionTokens = parseInt(localStorage.getItem('dse_completionTokens')) || 0;
    let isLoading = false, currentModel = 'deepseek-chat';
    const manuallyExpandedThinkings = new Set();

    const settings = {
        enterSends: false, showUser: true, showAssistant: true, streaming: false,
        msgAutoCollapse: false, msgCollapseSize: 20000, blockAutoCollapse: false,
        blockCollapseSize: 5000, fontScale: 0.5
    };

    // ── Settings with MATCHING save/load keys ──
    const SETTINGS_MAP = {
        enterSends:         ['dse_enterSends',         'bool',  false],
        showUser:           ['dse_showUser',           'bool',  true],
        showAssistant:      ['dse_showAssistant',      'bool',  true],
        streaming:          ['dse_streaming',          'bool',  false],
        msgAutoCollapse:    ['dse_msgAutoCollapse',    'bool',  false],
        msgCollapseSize:    ['dse_msgCollapseSize',    'num',   20000],
        blockAutoCollapse:  ['dse_blockAutoCollapse',  'bool',  false],
        blockCollapseSize:  ['dse_blockCollapseSize',  'num',   5000],
        fontScale:          ['dse_fontScale',          'float', 0.5]
    };

    function loadSettings() {
        for (const [prop, [key, type, def]] of Object.entries(SETTINGS_MAP)) {
            const raw = localStorage.getItem(key);
            if (raw === null) { settings[prop] = def; continue; }
            if (type === 'bool') settings[prop] = raw === 'true';
            else if (type === 'num') settings[prop] = parseInt(raw) || def;
            else if (type === 'float') settings[prop] = parseFloat(raw) || def;
        }
        document.documentElement.style.setProperty('--block-font-scale', settings.fontScale);
    }

    function saveSettings() {
        for (const [prop, [key]] of Object.entries(SETTINGS_MAP)) {
            localStorage.setItem(key, settings[prop]);
        }
        localStorage.setItem('dse_promptTokens', promptTokens);
        localStorage.setItem('dse_completionTokens', completionTokens);
        document.documentElement.style.setProperty('--block-font-scale', settings.fontScale);
        updateTokenDisplay(); applyVisibility(); refreshCollapseStates();
    }

    function syncUI() {
        els.enterSendsToggle.checked = settings.enterSends;
        els.showUserToggle.checked = settings.showUser;
        els.showAssistantToggle.checked = settings.showAssistant;
        els.streamToggle.checked = settings.streaming;
        els.msgCollapseToggle.checked = settings.msgAutoCollapse;
        els.msgCollapseSize.value = settings.msgCollapseSize;
        els.blockCollapseToggle.checked = settings.blockAutoCollapse;
        els.blockCollapseSize.value = settings.blockCollapseSize;
        els.fontScale.value = settings.fontScale;
        els.messageInput.placeholder = settings.enterSends ? 'Type a message… (Enter to send)' : 'Type a message… (Enter for new line)';
        updateTokenDisplay(); applyVisibility(); refreshCollapseStates();
    }

    function updateTokenDisplay() { els.tokenCounter.textContent = `${promptTokens}+${completionTokens} tokens`; }
    function applyVisibility() {
        document.querySelectorAll('.message.user').forEach(el => el.style.display = settings.showUser ? '' : 'none');
        document.querySelectorAll('.message.assistant').forEach(el => el.style.display = settings.showAssistant ? '' : 'none');
    }

    function refreshCollapseStates() {
        document.querySelectorAll('.message').forEach(msg => {
            const charSpan = msg.querySelector('.char-count');
            const charCount = parseInt(charSpan?.textContent) || 0;
            const body = msg.querySelector('.msg-body');
            const toggle = msg.querySelector('.toggle-btn');
            if (!body || !toggle) return;
            const collapsed = settings.msgAutoCollapse && charCount > settings.msgCollapseSize;
            body.classList.toggle('collapsed', collapsed);
            toggle.classList.toggle('collapsed', collapsed);
            const footToggle = body.querySelector('.footer-toggle-btn');
            if (footToggle) footToggle.textContent = collapsed ? '▼' : '▲';
        });
        document.querySelectorAll('.code-block').forEach(block => {
            const cntSpan = block.querySelector('.block-char-count');
            const cnt = parseInt(cntSpan?.textContent) || 0;
            const body = block.querySelector('.code-body');
            const arrows = block.querySelectorAll('.block-arrow');
            const footer = block.querySelector('.code-footer');
            if (!body || arrows.length===0) return;
            const collapsed = settings.blockAutoCollapse && cnt > settings.blockCollapseSize;
            body.classList.toggle('collapsed', collapsed);
            arrows.forEach(a => a.textContent = collapsed ? '▼' : '▲');
            if (footer) footer.style.display = collapsed ? 'none' : 'flex';
        });
    }

    let toastTimer;
    function showToast(msg, error=false) {
        clearTimeout(toastTimer);
        els.toast.textContent = msg;
        els.toast.className = 'toast '+(error?'error':'');
        void els.toast.offsetHeight;
        els.toast.classList.add('show');
        toastTimer = setTimeout(() => els.toast.classList.remove('show'), 3000);
    }

    function utcNow() { return new Date().toISOString().replace('T',' ').slice(0,19)+' UTC'; }

    function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function formatMarkdown(rawText) {
        const lines = rawText.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n');
        let out='', inBlock=false, lang='', code='';
        for (const line of lines) {
            if (!inBlock) {
                const m = line.match(/^```(\w*)\s*$/);
                if (m) { inBlock=true; lang=m[1]||'plain'; code=''; continue; }
                out += escapeHtml(line)+'\n';
            } else {
                if (/^```\s*$/.test(line)) {
                    out += `<pre data-lang="${escapeHtml(lang)}"><code>${escapeHtml(code).replace(/\n$/,'')}</code></pre>\n`;
                    inBlock=false; lang='';
                } else code += line+'\n';
            }
        }
        if (inBlock) out += `<pre data-lang="${escapeHtml(lang)}"><code>${escapeHtml(code).replace(/\n$/,'')}</code></pre>\n`;

        let final='', remaining=out, preRegex=/(<pre data-lang="[^"]*"><code>[\s\S]*?<\/code><\/pre>)/g, last=0, m;
        while ((m=preRegex.exec(out))!==null) {
            final += processInline(out.slice(last,m.index));
            final += m[0]; last=preRegex.lastIndex;
        }
        final += processInline(out.slice(last));
        return final;
    }

    function processInline(t) {
        return t.replace(/`([^`]+)`/g,'<code>$1</code>')
                .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
                .replace(/\*([^*]+)\*/g,'<em>$1</em>')
                .replace(/^### (.+)$/gm,'<h4>$1</h4>')
                .replace(/^## (.+)$/gm,'<h3>$1</h3>')
                .replace(/^[\*\-] (.+)$/gm,'<li>$1</li>')
                .replace(/(<li>.*<\/li>(\n?<li>.*<\/li>)*)/g,'<ul>$1</ul>')
                .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
                .replace(/\n\n+/g,'</p><p>')
                .replace(/^/,'<p>').replace(/$/,'</p>')
                .replace(/<p>\s*<\/p>/g,'')
                .replace(/<p>\s*(<ul>)/g,'$1').replace(/(<\/ul>)\s*<\/p>/g,'$1')
                .replace(/<p>\s*(<h[34]>)/g,'$1').replace(/(<\/h[34]>)\s*<\/p>/g,'$1');
    }

    function buildThinkingSection(text, msgId) {
        if (!text?.trim()) return '';
        return `<div class="thinking-block" data-msg-id="${msgId}">
            <div class="thinking-header"><span>🧠 Thinking · ${text.length} chars</span><span class="arrow">▼</span></div>
            <div class="thinking-body">${escapeHtml(text)}</div></div>`;
    }

    function wrapCodeBlocks(bubbleEl) {
        bubbleEl.querySelectorAll('pre').forEach(pre => {
            if (pre.closest('.code-block')) return;
            const codeEl = pre.querySelector('code');
            if (!codeEl) return;
            const text = codeEl.textContent || '', lang = pre.getAttribute('data-lang')||'plain', cnt = text.length;
            const wrapper = document.createElement('div');
            wrapper.className = 'code-block';
            wrapper.innerHTML = `
                <div class="code-header">
                    <span class="lang">${escapeHtml(lang)}</span>
                    <span class="actions">
                        <span class="block-char-count">${cnt} chars</span>
                        <button class="copy-btn">📋 Copy</button>
                        <span class="block-arrow" style="cursor:pointer">▲</span>
                    </span>
                </div>
                <div class="code-body"></div>
                <div class="code-footer">
                    <span class="actions">
                        <span class="block-char-count">${cnt} chars</span>
                        <button class="copy-btn">📋 Copy</button>
                        <span class="block-arrow" style="cursor:pointer">▲</span>
                    </span>
                </div>`;
            const body = wrapper.querySelector('.code-body');
            body.appendChild(pre.cloneNode(true));
            pre.parentNode.replaceChild(wrapper, pre);

            const footer = wrapper.querySelector('.code-footer');
            const arrows = wrapper.querySelectorAll('.block-arrow');

            const toggle = () => {
                body.classList.toggle('collapsed');
                const collapsed = body.classList.contains('collapsed');
                arrows.forEach(a => a.textContent = collapsed ? '▼' : '▲');
                footer.style.display = collapsed ? 'none' : 'flex';
            };

            arrows.forEach(a => a.addEventListener('click', toggle));

            const shouldCollapse = settings.blockAutoCollapse && cnt > settings.blockCollapseSize;
            if (shouldCollapse) {
                body.classList.add('collapsed');
                arrows.forEach(a => a.textContent = '▼');
                footer.style.display = 'none';
            }

            wrapper.querySelectorAll('.copy-btn').forEach(b => b.addEventListener('click', async () => {
                await navigator.clipboard.writeText(text);
                showToast('Copied!');
            }));
        });
    }

    function createMessageElement(role, rawContent, thinking, meta) {
        const msgId = meta.id, totalChars = rawContent.length + (thinking?.length||0);
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        msgDiv.dataset.msgId = msgId;
        const header = document.createElement('div');
        header.className = 'msg-header';
        header.innerHTML = `<span class="msg-meta"><span>#${meta.num} · ${meta.timestamp}</span><span class="char-count">${totalChars} chars</span></span><button class="toggle-btn">▼</button>`;
        const body = document.createElement('div');
        body.className = 'msg-body';
        const row = document.createElement('div');
        row.className = 'msg-row';
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role==='user'?'U': role==='system-msg'?'ℹ️':'AI';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = (thinking ? buildThinkingSection(thinking, msgId) : '') + formatMarkdown(rawContent);
        wrapCodeBlocks(bubble);
        row.appendChild(avatar); row.appendChild(bubble);

        const footer = document.createElement('div');
        footer.className = 'msg-footer';
        footer.innerHTML = `<span>${totalChars} chars total (body ${rawContent.length} + thinking ${thinking?.length||0})</span>
            <button class="copy-msg-btn">📋 Copy</button>
            <button class="footer-toggle-btn">▲</button>`;

        body.appendChild(row); body.appendChild(footer);
        msgDiv.appendChild(header); msgDiv.appendChild(body);

        const toggleBtn = header.querySelector('.toggle-btn'),
              footBtn = footer.querySelector('.footer-toggle-btn');
        const syncToggle = () => {
            const collapsed = body.classList.contains('collapsed');
            toggleBtn.classList.toggle('collapsed', collapsed);
            footBtn.textContent = collapsed ? '▼' : '▲';
        };
        toggleBtn.addEventListener('click', () => { body.classList.toggle('collapsed'); syncToggle(); });
        footBtn.addEventListener('click', () => { body.classList.toggle('collapsed'); syncToggle(); });
        footer.querySelector('.copy-msg-btn').addEventListener('click', async () => {
            await navigator.clipboard.writeText(rawContent);
            showToast('Message copied!');
        });

        if (settings.msgAutoCollapse && totalChars > settings.msgCollapseSize) {
            body.classList.add('collapsed'); syncToggle();
        }

        if (thinking) {
            const thinkBlock = bubble.querySelector('.thinking-block');
            if (thinkBlock) {
                const head = thinkBlock.querySelector('.thinking-header'),
                      tBody = thinkBlock.querySelector('.thinking-body'),
                      arrow = head.querySelector('.arrow');
                head.addEventListener('click', () => {
                    tBody.classList.toggle('collapsed');
                    arrow.classList.toggle('collapsed');
                    if (!tBody.classList.contains('collapsed')) manuallyExpandedThinkings.add(msgId);
                    else manuallyExpandedThinkings.delete(msgId);
                });
            }
        }
        els.chatContainer.appendChild(msgDiv);
        if (role!=='system-msg') applyVisibility();
        return msgDiv;
    }

    function collapseOlderThinkings(latestId) {
        document.querySelectorAll('.thinking-block').forEach(block => {
            const mid = parseInt(block.dataset.msgId);
            if (mid===latestId || manuallyExpandedThinkings.has(mid)) return;
            const body = block.querySelector('.thinking-body'), arrow = block.querySelector('.arrow');
            if (body && !body.classList.contains('collapsed')) {
                body.classList.add('collapsed');
                arrow.classList.add('collapsed');
            }
        });
    }

    async function fetchModels() {
        if (!apiKey) return null;
        try {
            const r = await fetch('https://api.deepseek.com/v1/models', { headers: { Authorization: `Bearer ${apiKey}` } });
            if (!r.ok) return null;
            const d = await r.json();
            return (d.data||[]).map(m=>m.id).filter(Boolean);
        } catch { return null; }
    }

    function populateModels(models) {
        els.modelSelect.innerHTML = '';
        const list = (models?.length) ? models : ['deepseek-chat','deepseek-reasoner'];
        list.forEach(id => { const o = document.createElement('option'); o.value=id; o.textContent=id; els.modelSelect.appendChild(o); });
        const saved = localStorage.getItem('dse_model');
        els.modelSelect.value = (saved && list.includes(saved)) ? saved : list[0];
        currentModel = els.modelSelect.value; els.modelSelect.disabled = false;
    }

    async function loadModels() {
        els.statusDot.className = 'status-dot off';
        populateModels(await fetchModels());
        els.statusDot.className = apiKey ? 'status-dot' : 'status-dot off';
        updateSendBtn();
    }

    function updateSendBtn() {
        els.sendBtn.disabled = !(apiKey.length>10 && els.messageInput.value.trim() && !isLoading && !els.modelSelect.disabled);
    }

    async function callAPI(userMsg) {
        const valid = ['system','user','assistant'];
        const msgs = [{role:'system',content:'You are a helpful assistant.'},
                     ...conversationHistory.filter(m=>valid.includes(m.role)).map(m=>({role:m.role,content:m.rawContent})),
                     {role:'user',content:userMsg}];
        const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${apiKey}`},
            body:JSON.stringify({model:currentModel,messages:msgs,temperature:0.7,max_tokens:4096,stream:false})
        });
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${res.status}`); }
        const data = await res.json();
        if (!data.choices?.[0]?.message?.content) throw new Error('Empty response');
        if (data.usage) {
            promptTokens += data.usage.prompt_tokens||0; completionTokens += data.usage.completion_tokens||0;
            localStorage.setItem('dse_promptTokens',promptTokens); localStorage.setItem('dse_completionTokens',completionTokens);
            updateTokenDisplay();
        }
        return { content: data.choices[0].message.content, reasoning: data.choices[0].message.reasoning_content || '' };
    }

    async function streamAPI(userMsg, bubble, footer) {
        const valid = ['system','user','assistant'];
        const msgs = [{role:'system',content:'You are a helpful assistant.'},
                     ...conversationHistory.filter(m=>valid.includes(m.role)).map(m=>({role:m.role,content:m.rawContent})),
                     {role:'user',content:userMsg}];
        const res = await fetch('https://api.deepseek.com/v1/chat/completions', {
            method:'POST', headers:{'Content-Type':'application/json',Authorization:`Bearer ${apiKey}`},
            body:JSON.stringify({model:currentModel,messages:msgs,temperature:0.7,max_tokens:4096,stream:true})
        });
        if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message||`HTTP ${res.status}`); }
        const reader = res.body.getReader(), decoder = new TextDecoder();
        let full='', think='', usage=null, buffer='';
        while (true) {
            const {done,value} = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, {stream:true});
            const lines = buffer.split('\n');
            buffer = lines.pop(); // keep incomplete line
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const json = line.slice(6);
                if (json==='[DONE]') continue;
                try {
                    const p = JSON.parse(json);
                    if (p.choices?.[0]?.delta?.content) full += p.choices[0].delta.content;
                    if (p.choices?.[0]?.delta?.reasoning_content) think += p.choices[0].delta.reasoning_content;
                    bubble.innerHTML = (think ? buildThinkingSection(think, Date.now()+1) : '') + formatMarkdown(full);
                    wrapCodeBlocks(bubble);
                    footer.innerHTML = `<span>${full.length+think.length} chars total (body ${full.length} + thinking ${think.length})</span>
                        <button class="copy-msg-btn">📋 Copy</button><button class="footer-toggle-btn">▲</button>`;
                    els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
                    if (p.usage) usage = p.usage;
                } catch {}
            }
        }
        if (usage) {
            promptTokens += usage.prompt_tokens||0; completionTokens += usage.completion_tokens||0;
            localStorage.setItem('dse_promptTokens',promptTokens); localStorage.setItem('dse_completionTokens',completionTokens);
            updateTokenDisplay();
        }
        return { content: full, thinking: think };
    }

    async function sendMessage() {
        const text = els.messageInput.value.trim();
        if (!text || isLoading || els.sendBtn.disabled) return;
        els.messageInput.value = ''; els.messageInput.style.height = 'auto'; updateSendBtn();

        const userMsg = { role:'user', rawContent:text, thinking:null, timestamp:utcNow(), num:++msgCounter, id:Date.now() };
        conversationHistory.push(userMsg);
        createMessageElement('user', text, null, userMsg);
        saveHistory();

        const typing = document.createElement('div');
        typing.className = 'message assistant';
        typing.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
        els.chatContainer.appendChild(typing); els.chatContainer.scrollTop = els.chatContainer.scrollHeight;

        isLoading = true; updateSendBtn();
        try {
            if (settings.streaming) {
                typing.remove();
                const asst = { role:'assistant', rawContent:'', thinking:'', timestamp:utcNow(), num:++msgCounter, id:Date.now()+1 };
                conversationHistory.push(asst);
                const msgEl = createMessageElement('assistant', '', null, asst);
                const bub = msgEl.querySelector('.bubble'), foot = msgEl.querySelector('.msg-footer');
                const r = await streamAPI(text, bub, foot);
                asst.rawContent = r.content; asst.thinking = r.thinking||'';
                const total = r.content.length + (r.thinking?.length||0);
                msgEl.querySelector('.char-count').textContent = total + ' chars';
                foot.innerHTML = `<span>${total} chars total (body ${r.content.length} + thinking ${r.thinking?.length||0})</span>
                    <button class="copy-msg-btn">📋 Copy</button><button class="footer-toggle-btn">▲</button>`;
                collapseOlderThinkings(asst.id); saveHistory();
            } else {
                const { content, reasoning } = await callAPI(text);
                typing.remove();
                const asst = { role:'assistant', rawContent:content, thinking:reasoning||'', timestamp:utcNow(), num:++msgCounter, id:Date.now()+1 };
                conversationHistory.push(asst);
                createMessageElement('assistant', content, reasoning||null, asst);
                collapseOlderThinkings(asst.id); saveHistory();
            }
        } catch (e) {
            typing.remove();
            const err = { role:'system-msg', rawContent:`⚠️ Error: ${e.message}`, thinking:null, timestamp:utcNow(), num:++msgCounter, id:Date.now()+2 };
            conversationHistory.push(err);
            createMessageElement('system-msg', err.rawContent, null, err);
            saveHistory(); showToast(e.message, true);
        } finally { isLoading = false; updateSendBtn(); els.messageInput.focus(); }
    }

    function saveHistory() { localStorage.setItem('dse_history', JSON.stringify(conversationHistory)); }

    function loadHistory() {
        try {
            const s = localStorage.getItem('dse_history');
            if (s) {
                conversationHistory = JSON.parse(s);
                msgCounter = Math.max(0, ...conversationHistory.map(m=>m.num||0));
                els.chatContainer.querySelectorAll('.message').forEach(m=>m.remove());
                conversationHistory.forEach(m => createMessageElement(m.role, m.rawContent, m.thinking||null, m));
                els.welcomeScreen.style.display = conversationHistory.length ? 'none' : 'flex';
            }
        } catch {}
    }

    function adjustLayout() {
        if (window.visualViewport) {
            const h = window.visualViewport.height - els.chatContainer.previousElementSibling.offsetHeight - els.chatContainer.nextElementSibling.offsetHeight;
            els.chatContainer.style.height = Math.max(0, h) + 'px';
            els.chatContainer.scrollTop = els.chatContainer.scrollHeight;
        }
    }

    function bindKeyboard() {
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', adjustLayout);
            window.visualViewport.addEventListener('scroll', adjustLayout);
        }
        new ResizeObserver(adjustLayout).observe(document.querySelector('.input-area'));
    }

    // Event wiring
    els.saveKeyBtn.addEventListener('click', async () => {
        const key = els.apiKeyInput.value.trim();
        if (key.startsWith('sk-') && key.length>10) {
            apiKey = key; localStorage.setItem('dse_apikey', key);
            showToast('Key saved. Loading models...');
            await loadModels(); updateSendBtn(); adjustLayout();
        } else {
            apiKey = ''; localStorage.removeItem('dse_apikey');
            els.modelSelect.innerHTML = '<option>No key</option>'; els.modelSelect.disabled = true;
            updateSendBtn(); showToast('Key cleared');
        }
    });

    els.modelSelect.addEventListener('change', () => {
        currentModel = els.modelSelect.value;
        localStorage.setItem('dse_model', currentModel);
        showToast(`Model: ${currentModel}`);
    });

    els.settingsBtn.addEventListener('click', () => els.settingsPanel.classList.toggle('open'));
    document.addEventListener('click', e => { if (!els.settingsBtn.contains(e.target) && !els.settingsPanel.contains(e.target)) els.settingsPanel.classList.remove('open'); });

    els.applySettingsBtn.addEventListener('click', () => {
        settings.enterSends = els.enterSendsToggle.checked;
        settings.showUser = els.showUserToggle.checked;
        settings.showAssistant = els.showAssistantToggle.checked;
        settings.streaming = els.streamToggle.checked;
        settings.msgAutoCollapse = els.msgCollapseToggle.checked;
        settings.msgCollapseSize = parseInt(els.msgCollapseSize.value) || 20000;
        settings.blockAutoCollapse = els.blockCollapseToggle.checked;
        settings.blockCollapseSize = parseInt(els.blockCollapseSize.value) || 5000;
        settings.fontScale = parseFloat(els.fontScale.value) || 0.5;
        saveSettings(); syncUI(); showToast('Settings applied');
    });

    els.sendBtn.addEventListener('click', sendMessage);
    els.messageInput.addEventListener('keydown', e => {
        if (e.key === 'Enter' && settings.enterSends && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    els.messageInput.addEventListener('input', () => {
        els.messageInput.style.height = 'auto';
        els.messageInput.style.height = Math.min(els.messageInput.scrollHeight, 100) + 'px';
        updateSendBtn(); adjustLayout();
    });

    loadSettings(); syncUI(); loadHistory();
    const savedKey = localStorage.getItem('dse_apikey');
    if (savedKey) {
        apiKey = savedKey; els.apiKeyInput.value = savedKey;
        loadModels().then(() => { if (!conversationHistory.length) els.welcomeScreen.style.display = 'flex'; });
    } else {
        els.modelSelect.innerHTML = '<option>No key</option>'; els.modelSelect.disabled = true;
        els.statusDot.className = 'status-dot off';
    }
    updateSendBtn(); bindKeyboard(); adjustLayout(); els.messageInput.focus();
})();
</script>
</body>
</html>
