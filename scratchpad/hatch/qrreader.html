<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner</title>
    <!-- Load jsQR library -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        /* --- Theme Variables --- */
        :root {
            --bg: #f4f4f9; --surface: #ffffff; --text: #333333; --text-muted: #777777;
            --primary: #007bff; --primary-hover: #0056b3; --border: #eeeeee; --input-bg: #f9f9f9;
            --shadow: rgba(0, 0, 0, 0.1); --success: #28a745; --error: #dc3545;
        }
        [data-theme="dark"] {
            --bg: #121212; --surface: #1e1e1e; --text: #e0e0e0; --text-muted: #aaaaaa;
            --primary: #66b2ff; --primary-hover: #99ccff; --border: #333333; --input-bg: #2a2a2a;
            --shadow: rgba(0, 0, 0, 0.5); --success: #4ade80; --error: #ff6b6b;
        }

        /* --- Global Styles --- */
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: background 0.3s, color 0.3s; }
        .container { max-width: 600px; margin: 0 auto; background: var(--surface); padding: 20px; border-radius: 12px; box-shadow: 0 4px 12px var(--shadow); }
        #history-wrapper { max-width: 600px; margin: 30px auto 0; padding: 0; }
        h1, h2 { text-align: center; margin-top: 0; }
        
        /* --- Controls & Inputs --- */
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .icon-btn { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { border-color: var(--primary); }
        input[type="text"], textarea { width: 100%; padding: 10px; margin: 5px 0 15px; border-radius: 6px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); box-sizing: border-box; font-family: inherit; font-size: 15px; }
        input[type="file"] { display: none; }
        
        .btn { display: block; width: 100%; box-sizing: border-box; text-align: center; background: var(--primary); color: #fff; padding: 12px; font-size: 16px; font-weight: 500; border-radius: 8px; cursor: pointer; border: none; margin-top: 10px; transition: 0.2s; }
        .btn:hover { background: var(--primary-hover); }
        .btn-small { padding: 6px 12px; font-size: 14px; width: auto; display: inline-block; margin-top:0; }
        .btn-danger { background: var(--error); }
        .btn-danger:hover { background: #b02a37; }

        /* --- Video & UI States --- */
        .video-wrapper { position: relative; width: 100%; border-radius: 8px; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; min-height: 200px; }
        video { width: 100%; display: block; }
        .video-wrapper.manual-mode video { cursor: pointer; }
        .video-wrapper.manual-mode video:active { opacity: 0.8; }
        
        #camera-off-msg { position: absolute; color: white; font-weight: bold; display: none; }

        /* --- Camera Mode Buttons --- */
        .mode-container { margin-top: 15px; }
        .mode-label { font-weight: bold; font-size: 0.9em; color: var(--text-muted); display: block; margin-bottom: 8px; }
        .mode-grid { display: flex; flex-direction: column; gap: 8px; }
        .mode-btn { background: var(--input-bg); border: 2px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; transition: 0.2s; font-size: 14px; }
        .mode-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; font-weight: bold; }

        .divider { text-align: center; margin: 25px 0 15px; color: var(--text-muted); font-size: 0.9em; letter-spacing: 1px; }
        .msg { font-weight: bold; text-align: center; margin-top: 10px; min-height: 20px; font-size: 15px; }
        .msg.success { color: var(--success); }
        .msg.error { color: var(--error); }

        /* --- History Section --- */
        .history-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .history-card { background: var(--surface); padding: 16px; border-radius: 10px; box-shadow: 0 2px 8px var(--shadow); margin-bottom: 16px; border-left: 4px solid var(--primary); position: relative; }
        .history-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 12px; font-size: 0.85em; color: var(--text-muted); }
        .history-index { font-weight: bold; color: var(--text); font-size: 1.1em; }
        .history-data { margin-bottom: 12px; word-break: break-word; line-height: 1.5; }
        .history-data a { color: var(--primary); font-weight: 600; text-decoration: none; }
        .history-data a:hover { text-decoration: underline; }
        .history-image { max-width: 100%; max-height: 200px; border-radius: 6px; border: 1px solid var(--border); display: block; object-fit: contain; }
        
        .edit-mode { display: none; }
        .is-editing .view-mode { display: none; }
        .is-editing .edit-mode { display: block; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-actions">
            <h1 style="margin:0; font-size:1.5em;">QR Scanner</h1>
            <button id="theme-btn" class="icon-btn">🌓 Theme</button>
        </div>
        
        <!-- Video Feed -->
        <div class="video-wrapper" id="video-wrapper">
            <video id="video" autoplay playsinline></video>
            <span id="camera-off-msg">📷 Camera is Off</span>
        </div>
        <div id="feedback" class="msg success"></div>

        <!-- Camera Mode Selection -->
        <div class="mode-container">
            <span class="mode-label">camera mode:</span>
            <div class="mode-grid">
                <button class="mode-btn" id="btn-manual" onclick="setMode('manual')">manual(click image to process)</button>
                <button class="mode-btn active" id="btn-once" onclick="setMode('once')">once(checks till one qr is gotten)</button>
                <button class="mode-btn" id="btn-auto" onclick="setMode('auto')">auto(checks new qr till you turn off)</button>
                <button class="mode-btn" id="btn-off" onclick="setMode('off')">off</button>
            </div>
        </div>

        <div class="divider">— OR —</div>

        <!-- Multi-File Upload -->
        <label class="btn">
            📁 Upload Images
            <input type="file" id="file-input" accept="image/*" multiple>
        </label>
        <div id="error-msg" class="msg error"></div>
    </div>

    <!-- History View -->
    <div id="history-wrapper">
        <div class="history-controls">
            <h2 style="margin:0;">Scan History</h2>
            <div>
                <button class="btn btn-small" onclick="saveToLocal()">💾 Save Local</button>
                <button class="btn btn-small btn-danger" onclick="clearHistory()">🗑️ Clear</button>
            </div>
        </div>
        <div id="history-list"></div>
    </div>

    <canvas id="canvas" hidden></canvas>

    <script>
        // --- 1. THEME LOGIC ---
        const themeBtn = document.getElementById("theme-btn");
        const sysPref = window.matchMedia("(prefers-color-scheme: dark)");
        function setTheme(theme) {
            document.documentElement.setAttribute("data-theme", theme);
            themeBtn.innerText = theme === "dark" ? "☀️ Light" : "🌙 Dark";
            localStorage.setItem("qr-theme", theme);
        }
        setTheme(localStorage.getItem("qr-theme") || (sysPref.matches ? "dark" : "light"));
        themeBtn.addEventListener("click", () => setTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"));

        // --- 2. STATE & SETUP ---
        const video = document.getElementById("video");
        const videoWrapper = document.getElementById("video-wrapper");
        const cameraOffMsg = document.getElementById("camera-off-msg");
        const canvasEl = document.getElementById("canvas");
        const ctx = canvasEl.getContext("2d", { willReadFrequently: true });
        const historyList = document.getElementById("history-list");
        const feedback = document.getElementById("feedback");
        const errorMsg = document.getElementById("error-msg");

        let stream = null;
        let scanning = false;
        let globalIndex = 0;
        let historyArray = [];
        let lastScanTime = 0;
        const SCAN_INTERVAL = 100; // Scans 10 times a second
        
        let camMode = "once"; // 'manual', 'once', 'auto', 'off'
        let lastContinuousData = null; 

        function getCustomDate() {
            const d = new Date();
            const pad = (num, len=2) => String(num).padStart(len, '0');
            return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}.${pad(d.getMilliseconds(), 3)}`;
        }

        // --- 3. CAMERA HARDWARE LOGIC ---
        function startCamera() {
            if (stream) return; 
            cameraOffMsg.style.display = "none";
            video.style.display = "block";
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then(s => {
                    stream = s;
                    scanning = true;
                    video.srcObject = stream;
                    video.play();
                    requestAnimationFrame(tick);
                })
                .catch(() => errorMsg.innerText = "Camera denied. Use file upload.");
        }

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            scanning = false;
            video.srcObject = null;
            video.style.display = "none";
            cameraOffMsg.style.display = "block";
        }

        // --- 4. CAMERA MODES LOGIC ---
        function setMode(mode) {
            camMode = mode;
            
            // UI Button Updates
            document.querySelectorAll(".mode-btn").forEach(btn => btn.classList.remove("active"));
            document.getElementById(`btn-${mode}`).classList.add("active");

            if (mode === "manual") videoWrapper.classList.add("manual-mode");
            else videoWrapper.classList.remove("manual-mode");

            if (mode === "off") {
                stopCamera();
                feedback.innerText = "";
            } else {
                if (!stream) startCamera();
                lastContinuousData = null; 
                feedback.innerText = "";
            }
        }

        // --- 5. SCANNING LOGIC ---
        function tick(now) {
            if (!scanning) return;
            requestAnimationFrame(tick); 
            
            if (camMode === "manual" || camMode === "off") return;

            if (video.readyState === video.HAVE_ENOUGH_DATA && (now - lastScanTime >= SCAN_INTERVAL)) {
                lastScanTime = now;
                
                const vw = video.videoWidth;
                const vh = video.videoHeight;
                if(vw === 0 || vh === 0) return;

                canvasEl.width = vw; 
                canvasEl.height = vh;
                ctx.drawImage(video, 0, 0, vw, vh);
                
                const qrData = scanPixels(ctx, vw, vh, true);
                
                if (qrData) {
                    if (camMode === "once") {
                        addHistoryItem(qrData, compressImage(canvasEl, 300), "Camera Scan");
                        feedback.innerText = "✅ QR Scanned! Camera turned off.";
                        setTimeout(() => { if (feedback.innerText.includes("turned off")) feedback.innerText = ""; }, 4000);
                        
                        setMode("off"); // Auto turn off

                    } else if (camMode === "auto") {
                        if (qrData !== lastContinuousData) {
                            addHistoryItem(qrData, compressImage(canvasEl, 300), "Auto Scan");
                            lastContinuousData = qrData;
                            feedback.innerText = "✅ New QR Added!";
                            setTimeout(() => feedback.innerText = "", 2000);
                        }
                    }
                }
            }
        }

        // Manual Click Handler
        videoWrapper.addEventListener("click", () => {
            if (camMode !== "manual" || !stream || video.readyState !== video.HAVE_ENOUGH_DATA) return;
            
            canvasEl.width = video.videoWidth; canvasEl.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvasEl.width, canvasEl.height);
            const qrData = scanPixels(ctx, canvasEl.width, canvasEl.height, true);
            
            if (qrData) {
                addHistoryItem(qrData, compressImage(canvasEl, 300), "Manual Capture");
                feedback.innerText = "✅ QR Captured!";
                setTimeout(() => feedback.innerText = "", 2500);
            } else {
                errorMsg.innerText = "❌ No QR found in frame.";
                setTimeout(() => errorMsg.innerText = "", 2000);
            }
        });

        // --- 6. FILE UPLOAD LOGIC (MULTI-PASS SCANNER) ---
        document.getElementById("file-input").addEventListener("change", e => {
            const files = Array.from(e.target.files);
            if (!files.length) return;
            errorMsg.innerText = "⏳ Processing images...";
            
            files.forEach(file => {
                const url = URL.createObjectURL(file);
                const img = new Image();
                img.onload = () => {
                    URL.revokeObjectURL(url); 
                    
                    let foundData = null;
                    let finalCanvas = null;

                    // Multi-Pass: Try scanning at 100%, 75%, 50%, and 25% size.
                    // This forces "circular" style QR codes (like Chrome's T-Rex) to blur into readable blocks.
                    const testScales = [1, 0.75, 0.5, 0.25];
                    
                    for (let s of testScales) {
                        const MAX_DIM = 3000 * s; 
                        const scale = Math.min(MAX_DIM / img.width, MAX_DIM / img.height, 1);
                        const w = Math.floor(img.width * scale); 
                        const h = Math.floor(img.height * scale);

                        const tCanvas = document.createElement("canvas");
                        tCanvas.width = w; tCanvas.height = h;
                        const tCtx = tCanvas.getContext("2d", { willReadFrequently: true });
                        
                        // Turn ON smoothing to blend circular dots together
                        tCtx.imageSmoothingEnabled = true; 
                        tCtx.drawImage(img, 0, 0, w, h);
                        
                        const qrData = scanPixels(tCtx, w, h, true);
                        if (qrData) {
                            foundData = qrData;
                            finalCanvas = tCanvas;
                            break; // Stop trying scales if we found it!
                        }
                    }
                    
                    if (foundData) {
                        addHistoryItem(foundData, compressImage(finalCanvas, 300), file.name);
                    } else {
                        errorMsg.innerText += `\n❌ No QR in: ${file.name}`;
                    }
                };
                img.src = url;
            });
            e.target.value = ""; 
            setTimeout(() => { if(errorMsg.innerText.includes("⏳")) errorMsg.innerText = ""; }, 3000);
        });

        // --- 7. HELPERS ---
        function scanPixels(context, w, h, tryHarder) {
            try {
                const imgData = context.getImageData(0, 0, w, h);
                const code = jsQR(imgData.data, w, h, { inversionAttempts: tryHarder ? "attemptBoth" : "dontInvert" });
                return code ? code.data : null;
            } catch (err) { return null; }
        }

        function compressImage(sourceCanvas, maxDim = 300) {
            const scale = Math.min(maxDim / sourceCanvas.width, maxDim / sourceCanvas.height, 1);
            const tCan = document.createElement("canvas");
            tCan.width = sourceCanvas.width * scale; tCan.height = sourceCanvas.height * scale;
            tCan.getContext("2d").drawImage(sourceCanvas, 0, 0, tCan.width, tCan.height);
            return tCan.toDataURL("image/jpeg", 0.6); 
        }

        // --- 8. HISTORY & DATA MANAGEMENT ---
        function addHistoryItem(data, imgUrl, filename) {
            globalIndex++;
            const newItem = {
                id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                index: globalIndex, date: getCustomDate(), filename: filename, data: data, image: imgUrl
            };
            historyArray.unshift(newItem); 
            renderHistory();
        }

        function renderHistory() {
            historyList.innerHTML = "";
            historyArray.forEach(item => {
                const isUrl = /^https?:\/\//i.test(item.data);
                const linkHtml = isUrl ? `<a href="${item.data}" target="_blank" rel="noopener noreferrer">${item.data}</a>` : `<span>${item.data}</span>`;

                const card = document.createElement("div");
                card.className = "history-card";
                card.id = `card-${item.id}`;
                card.innerHTML = `
                    <div class="history-header">
                        <div><span class="history-index">#${item.index}</span> | <span>${item.date}</span></div>
                        <div>
                            <button class="icon-btn" onclick="toggleEdit('${item.id}')" title="Edit">✏️</button>
                            <button class="icon-btn" onclick="deleteItem('${item.id}')" title="Delete">🗑️</button>
                        </div>
                    </div>
                    
                    <div class="history-data view-mode">
                        <strong>File:</strong> ${item.filename} <br>
                        <strong>Data:</strong> ${linkHtml}
                    </div>

                    <div class="history-data edit-mode">
                        <strong>File:</strong>
                        <input type="text" id="edit-file-${item.id}" value="${item.filename}">
                        <strong>Data:</strong>
                        <textarea id="edit-data-${item.id}" rows="3">${item.data}</textarea>
                        <button class="btn btn-small" onclick="saveEdit('${item.id}')">💾 Save</button>
                        <button class="btn btn-small btn-danger" onclick="toggleEdit('${item.id}')">❌ Cancel</button>
                    </div>

                    <img src="${item.image}" class="history-image" alt="QR Thumbnail">
                `;
                historyList.appendChild(card);
            });
        }

        function toggleEdit(id) { document.getElementById(`card-${id}`).classList.toggle("is-editing"); }
        function saveEdit(id) {
            const idx = historyArray.findIndex(i => i.id === id);
            if(idx > -1) {
                historyArray[idx].filename = document.getElementById(`edit-file-${id}`).value;
                historyArray[idx].data = document.getElementById(`edit-data-${id}`).value;
                renderHistory();
                if(localStorage.getItem('qr-history')) saveToLocal(true);
            }
        }
        function deleteItem(id) {
            if(!confirm("Delete this scan?")) return;
            historyArray = historyArray.filter(i => i.id !== id);
            renderHistory();
            if(localStorage.getItem('qr-history')) saveToLocal(true);
        }
        function clearHistory() {
            if(!confirm("Clear ALL history? Cannot be undone.")) return;
            historyArray = []; globalIndex = 0;
            localStorage.removeItem('qr-history'); localStorage.removeItem('qr-index');
            renderHistory();
        }

        // --- 9. LOCAL STORAGE ---
        function saveToLocal(silent = false) {
            try {
                localStorage.setItem('qr-history', JSON.stringify(historyArray));
                localStorage.setItem('qr-index', globalIndex.toString());
                if(!silent) alert("✅ History saved successfully!");
            } catch (e) { alert("❌ Storage Full! Delete some older scans."); }
        }
        function loadFromLocal() {
            const saved = localStorage.getItem('qr-history');
            if (saved) {
                historyArray = JSON.parse(saved);
                globalIndex = parseInt(localStorage.getItem('qr-index') || historyArray.length);
                renderHistory();
            }
        }
        
        // Start everything on load
        window.onload = () => { loadFromLocal(); startCamera(); };
    </script>
</body>
</html>
